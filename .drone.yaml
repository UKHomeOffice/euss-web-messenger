---
kind: pipeline
name: Build Image
type: kubernetes

platform:
  os: linux
  arch: amd64

environment:
  APP_NAME: ukvi-euss
  UAT_ENV: sas-web-messengers-uat
  GIT_REPO: UKHomeOffice/euss-web-messenger
  HOF_CONFIG: hof-services-config/Ukimmigration-Support-Webchat
  BRANCH_ENV: sas-web-messengers-branch
  STG_ENV: sas-web-messengers-stg
  PROD_ENV: sas-web-messengers-prod
  PRODUCTION_URL: ukvi-euss-support-webchat.homeoffice.gov.uk
  IMAGE_URL: 340268328991.dkr.ecr.eu-west-2.amazonaws.com
  IMAGE_REPO: so/euss-web-messenger
  NON_PROD_AVAILABILITY: Mon-Fri 00:00-23:59 Europe/London
  READY_FOR_TEST_DELAY: 20s

include_default_branch: &include_default_branch
  include:
    - main

include_all_branches: &include_all_branches
  include:
    - main
    - feature/*
    - fix/*

trigger:
  branch:
    <<: *include_all_branches

node_image: &node_image
  pull: if-not-exists
  image: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749

lint: &lint
  pull: if-not-exists
  image: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749
  commands:
    - yarn lint:ci

unit_tests: &unit_tests
  pull: if-not-exists
  image: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749
  commands:
    - yarn run test:unit

sonar_scanner: &sonar_scanner
  pull: always
  image: quay.io/ukhomeofficedigital/sonar-scanner:latest
  commands:
    - sonar-scanner -Dproject.settings=./sonar-project.properties

steps:
  - name: clone_repos
    image: alpine/git
    environment:
      DRONE_GIT_USERNAME:
        from_secret: drone_git_username
      DRONE_GIT_TOKEN:
        from_secret: drone_git_token
    commands:
      - git clone https://$${DRONE_GIT_USERNAME}:$${DRONE_GIT_TOKEN}@github.com/UKHomeOfficeForms/hof-services-config.git
      - find hof-services-config/* | grep -v $HOF_CONFIG | grep -v 'infrastructure' | xargs rm -rf
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
  - name: scan_base_image_os
    pull: always
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    resources:
      limits:
        cpu: 1000
        memory: 1024Mi
    environment:
      IMAGE_NAME: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749
      SERVICE_URL: https://acp-trivy-helm.acp-trivy.svc.cluster.local:443
      SEVERITY: MEDIUM,HIGH,CRITICAL  --dependency-tree
      FAIL_ON_DETECTION: false
      IGNORE_UNFIXED: false
    volumes:
      - name: dockersock
        path: /root/.dockersock
    when:
      event: [push, pull_request]
  - name: lint
    <<: *node_image
    commands:
      - yarn install --frozen-lockfile
      - yarn lint
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
  - name: unit_tests
    <<: *node_image
    commands:
      - yarn install --frozen-lockfile
      - yarn test
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
    depends_on:
      - lint
  - name: sonar_scanner
    <<: *sonar_scanner
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
  - name: build
    pull: if-not-exists
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind:latest
    commands:
      # wait for docker service to be up before running docker build
      - /usr/local/bin/wait
      - docker build -t so/euss-web-messenger:$${DRONE_COMMIT_SHA} .
    volumes:
      - name: dockersock
        path: /var/run
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
    depends_on:
      - unit_tests
  - name: push_ecr
    pull: if-not-exists
    image: plugins/ecr
    environment:
      AWS_REGION: eu-west-2
    settings:
      access_key:
        from_secret: AWS_ACCESS_KEY_ID
      secret_key:
        from_secret: AWS_SECRET_ACCESS_KEY
      repo: so/euss-web-messenger
      registry: 340268328991.dkr.ecr.eu-west-2.amazonaws.com
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
    depends_on:
      - build
  # Trivy Security Scannner
  - name: scan-node-packages
    pull: always
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    resources:
      limits:
        cpu: 1000
        memory: 1024Mi
    environment:
      IMAGE_NAME: so/euss-web-messenger:${DRONE_COMMIT_SHA}
      SEVERITY: MEDIUM,HIGH,CRITICAL
      FAIL_ON_DETECTION: false
      IGNORE_UNFIXED: false
    when:
      event:
      - pull_request
      - push
    depends_on:
      - build
      
  - name: deploy_to_branch
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      # NOTIFY_STUB: stub
      KUBE_SERVER:
        from_secret: KUBE_SERVER_DEV
      KUBE_TOKEN:
        from_secret: KUBE_TOKEN_DEV
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - bin/deploy.sh $${BRANCH_ENV}
    when:
      branch:
        <<: *include_all_branches
      event: pull_request
    depends_on:
      - clone_repos
      - push_ecr

  # Run playwright tests against the pull request branch environment
  - name: e2e_tests
    pull: if-not-exists
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - yarn playwright install --with-deps
      - yarn install --frozen-lockfile
      - test -s /root/.dockersock/branch_url.txt || (echo "Missing deployed branch URL at /root/.dockersock/branch_url.txt" && exit 1)
      - CI=true PLAYWRIGHT_BASE_URL="https://$(cat /root/.dockersock/branch_url.txt)" yarn test:e2e
    when:
      branch:
        <<: *include_all_branches
      event: pull_request
    depends_on:
      - deploy_to_branch

  # Upload Playwright HTML report for PR and comment a download link
  - name: publish_e2e_report_to_pr
    pull: if-not-exists
    image: alpine:3.21
    environment:
      GITHUB_TOKEN:
        from_secret: drone_git_token
    commands:
      - apk add --no-cache curl jq zip
      - test -d playwright-report || (echo "Missing playwright-report directory" && exit 1)
      - export REPORT_ARCHIVE="playwright-report-pr-${DRONE_PULL_REQUEST}-${DRONE_BUILD_NUMBER}.zip"
      - zip -r "$REPORT_ARCHIVE" playwright-report
      - export GH_API="https://api.github.com/repos/${GIT_REPO}"
      - export TAG_NAME="pr-${DRONE_PULL_REQUEST}-playwright-report"
      - |
        RELEASE_RESPONSE=$(curl -sS \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "${GH_API}/releases/tags/${TAG_NAME}")
      - |
        if [ "$(echo "$RELEASE_RESPONSE" | jq -r '.id // empty')" = "" ]; then
          RELEASE_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GH_API}/releases" \
            -d "$(jq -n --arg tag "$TAG_NAME" --arg name "Playwright Report PR #${DRONE_PULL_REQUEST}" '{tag_name:$tag,name:$name,prerelease:true,draft:false}')")
        fi
      - export RELEASE_ID="$(echo "$RELEASE_RESPONSE" | jq -r '.id')"
      - |
        for ASSET_ID in $(echo "$RELEASE_RESPONSE" | jq -r --arg prefix "playwright-report-pr-${DRONE_PULL_REQUEST}-" '.assets[]? | select(.name | startswith($prefix)) | .id'); do
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GH_API}/releases/assets/${ASSET_ID}" >/dev/null
        done
      - |
        ASSET_RESPONSE=$(curl -sS -X POST \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Content-Type: application/zip" \
          --data-binary @"${REPORT_ARCHIVE}" \
          "https://uploads.github.com/repos/${GIT_REPO}/releases/${RELEASE_ID}/assets?name=${REPORT_ARCHIVE}")
      - export DOWNLOAD_URL="$(echo "$ASSET_RESPONSE" | jq -r '.browser_download_url')"
      - test "$DOWNLOAD_URL" != "null" || (echo "Failed to upload report asset" && echo "$ASSET_RESPONSE" && exit 1)
      - |
        curl -sS -X POST \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "${GH_API}/issues/${DRONE_PULL_REQUEST}/comments" \
          -d "$(jq -n --arg url "$DOWNLOAD_URL" --arg build "$DRONE_BUILD_LINK" '{body:("Playwright HTML report for this PR build is available here:\n\n" + $url + "\n\nDrone build: " + $build)}')"
    when:
      branch:
        <<: *include_all_branches
      event: pull_request
    depends_on:
      - e2e_tests
  
  # Deploy to Master UAT environment
  - name: deploy_to_uat
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: KUBE_SERVER_DEV
      KUBE_TOKEN:
        from_secret: KUBE_TOKEN_DEV
    commands:
      - sh bin/deploy.sh $${UAT_ENV}
    when:
      branch:
        <<: *include_default_branch
      event: push
    depends_on:
      - push_ecr
  # Get pull request branch so correct PR UAT environment is torn down in the tear_down_branch step that follows
  - name: get_pr_branch
    pull: if-not-exists
    image: drone/cli:alpine@sha256:14409f7f7247befb9dd2effdb2f61ac40d1f5fbfb1a80566cf6f2f8d21f3be11
    environment:
      DRONE_SERVER:
        from_secret: drone_server
      DRONE_TOKEN:
        from_secret: drone_token
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - drone build info $GIT_REPO $DRONE_BUILD_NUMBER --format {{.Message}} | grep -o '[^ ]\+$' -m1 | sed 's|UKHomeOffice/||g' | tr '[:upper:]' '[:lower:]' | tr '/' '-' > /root/.dockersock/branch_name.txt
    when:
      branch:
        <<: *include_default_branch
      event: push
  # Tear down pull request UAT environment
  - name: tear_down_branch
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: KUBE_SERVER_DEV
      KUBE_TOKEN:
        from_secret: KUBE_TOKEN_DEV
    volumes:
      - name: dockersock
        path: /root/.dockersock
    commands:
      - bin/deploy.sh tear_down
    when:
      branch:
        <<: *include_default_branch
      event: push
    depends_on:
      - get_pr_branch
      - deploy_to_uat

  - name: clone_repos_stg
    image: alpine/git
    environment:
      DRONE_GIT_USERNAME:
        from_secret: drone_git_username
      DRONE_GIT_TOKEN:
        from_secret: drone_git_token
    commands:
      - git clone https://$${DRONE_GIT_USERNAME}:$${DRONE_GIT_TOKEN}@github.com/UKHomeOfficeForms/hof-services-config.git
    when:
      target: STG
      event: promote

  - name: deploy_to_stg
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: KUBE_SERVER_PROD
      KUBE_TOKEN:
        from_secret: KUBE_TOKEN_PROD
    commands:
      - bin/deploy.sh $${STG_ENV}
    when:
      target: STG
      event: promote
    depends_on:
      - clone_repos_stg
      
  # Checks a build being promoted has passed, is on master which effectively means a healthy build on Staging
  - name: sanity_check_build_prod
    pull: if-not-exists
    image: drone/cli:alpine@sha256:14409f7f7247befb9dd2effdb2f61ac40d1f5fbfb1a80566cf6f2f8d21f3be11
    environment:
      DRONE_SERVER:
        from_secret: drone_server
      DRONE_TOKEN:
        from_secret: drone_token
    commands:
      - bin/sanity_check_build.sh
    when:
      target: PROD
      event: promote

  - name: clone_repos_prod
    image: alpine/git
    environment:
      DRONE_GIT_USERNAME:
        from_secret: drone_git_username
      DRONE_GIT_TOKEN:
        from_secret: drone_git_token
    commands:
      - git clone https://$${DRONE_GIT_USERNAME}:$${DRONE_GIT_TOKEN}@github.com/UKHomeOfficeForms/hof-services-config.git
    when:
      target: PROD
      event: promote
    depends_on:
      - sanity_check_build_prod

  # Deploy to Production environment
  - name: deploy_to_prod
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: KUBE_SERVER_PROD
      KUBE_TOKEN:
        from_secret: KUBE_TOKEN_PROD
    commands:
      - bin/deploy.sh $${PROD_ENV}
    when:
      target: PROD
      event: promote
    depends_on:
      - clone_repos_prod

    # CRON job steps that runs security scans using Trivy
  - name: cron_clone_repos
    image: alpine/git
    environment:
      DRONE_GIT_USERNAME:
        from_secret: DRONE_GIT_USERNAME
      DRONE_GIT_TOKEN:
        from_secret: DRONE_GIT_TOKEN
    commands:
      - git clone https://$${DRONE_GIT_USERNAME}:$${DRONE_GIT_TOKEN}@github.com/UKHomeOfficeForms/hof-services-config.git
    when:
      cron: security_scans
      event: cron

  - name: cron_build_image
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind
    commands:
      # wait for docker service to be up before running docker build
      - /usr/local/bin/wait
      - docker build --no-cache -t so/euss-web-messenger:${DRONE_COMMIT_SHA} .
    volumes:
      - name: dockersock
        path: /var/run
    when:
      cron: security_scans
      event: cron

  - name: cron_trivy_scan_image_os
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    pull: always
    environment:
      IMAGE_NAME: node:24.15.0-alpine3.23@sha256:8e2c930fda481a6ec141fe5a88e8c249c69f8102fe98af505f38c081649ea749
      SEVERITY: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --dependency-tree
      FAIL_ON_DETECTION: true
      IGNORE_UNFIXED: false
      ALLOW_CVE_LIST_FILE: hof-services-config/infrastructure/trivy/.trivyignore.yaml
    when:
      cron: security_scans
      event: cron
    depends_on:
      - cron_clone_repos

  - name: cron_trivy_scan_node_packages
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/trivy/client:latest
    pull: always
    environment:
        IMAGE_NAME: so/euss-web-messenger:${DRONE_COMMIT_SHA}
        SERVICE_URL: https://acp-trivy-helm.acp-trivy.svc.cluster.local:443
        SEVERITY: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --dependency-tree
        FAIL_ON_DETECTION: false
        IGNORE_UNFIXED: false
    when:
      cron: security_scans
      event: cron
      status:
        - success
        - failure
    depends_on:
      - cron_build_image
      - cron_clone_repos
 
  # Slack notification upon a CRON job fail
  # CRON job step that tears down our pull request UAT environments
  - name: cron_tear_down
    pull: if-not-exists
    image: quay.io/ukhomeofficedigital/kd:v1.14.0
    environment:
      KUBE_SERVER:
        from_secret: kube_server_dev
      KUBE_TOKEN:
        from_secret: kube_token_dev
    commands:
      - bin/clean_up.sh $${BRANCH_ENV}
    when:
      cron: security_scans
      event: cron
      status:
        - success
        - failure
    depends_on:
      - cron_build_image
      - cron_clone_repos

  - name: cron_notify_slack_security_scans
    pull: if-not-exists
    image: plugins/slack
    settings:
      failure: ignore
      template: "CRON Job {{build.deployTo}} of EUSS Web Messenger has {{build.status}} - <{{build.link}}|#{{build.number}}> {{#success build.status}}\n  :thumbsup: :thumbsup: :thumbsup:\n{{else}}\n  :x: :x: :x:\n{{/success}} Author: {{build.author}}\n\nDuration: {{since job.started}}\n\nJob: <{{build.link}}|#{{build.number}}>\n\nCommit: {{build.commit}}\n"
      webhook:
        from_secret: slack_webhook
    when:
      cron: security_scans
      event: cron
      status:
        - failure
    depends_on:
      - cron_trivy_scan_image_os
      - cron_trivy_scan_node_packages

services:
  - name: docker
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind

volumes:
  - name: dockersock
    temp: {}
